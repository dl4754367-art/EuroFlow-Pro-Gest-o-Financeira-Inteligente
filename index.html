<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroFlow Pro - Gestão Financeira</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2546407384279019" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #4e54c8;
            --secondary: #8f94fb;
            --success: #2ecc71;
            --danger: #e74c3c;
            --light: #f4f7f6;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .stat-box {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: #fff;
            border: 1px solid #eee;
            margin: 0 5px;
            border-radius: 10px;
        }

        .stat-income { color: var(--success); font-weight: bold; }
        .stat-expense { color: var(--danger); font-weight: bold; }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: var(--dark); }

        .transaction-list {
            margin-top: 20px;
            list-style: none;
            padding: 0;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        /* Espaço para o Anúncio Google */
        .ad-container {
            margin-top: 20px;
            text-align: center;
            min-height: 90px;
            background: #fafafa;
            border: 1px dashed #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>EuroFlow Pro 📉</h1>
    </header>

    <div class="balance-card">
        <p>Saldo Disponível</p>
        <h2 id="balance">€ 0,00</h2>
    </div>

    <div class="stats">
        <div class="stat-box">
            <small>Entradas</small>
            <div id="total-income" class="stat-income">€ 0,00</div>
        </div>
        <div class="stat-box">
            <small>Saídas</small>
            <div id="total-expense" class="stat-expense">€ 0,00</div>
        </div>
    </div>

    <div class="form">
        <input type="text" id="desc" placeholder="Descrição (ex: Compras)">
        <input type="number" id="amount" placeholder="Valor (€)">
        <select id="type">
            <option value="income">Entrada</option>
            <option value="expense">Saída</option>
        </select>
        <button onclick="addTransaction()">Adicionar Registo</button>
        <button style="background-color: #27ae60;" onclick="exportToExcel()">Exportar para Excel 📊</button>
    </div>

    <ul id="transaction-list" class="transaction-list"></ul>

    <div class="ad-container">
        <p style="color: #999; font-size: 10px;">Publicidade</p>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-2546407384279019"
             data-ad-slot="auto"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;

        if (desc === '' || amount === '') return;

        const transaction = { desc, amount: parseFloat(amount), type };
        transactions.push(transaction);
        updateUI();
        saveData();
    }

    function updateUI() {
        const list = document.getElementById('transaction-list');
        const balanceEl = document.getElementById('balance');
        const incomeEl = document.getElementById('total-income');
        const expenseEl = document.getElementById('total-expense');

        list.innerHTML = '';
        let balance = 0, income = 0, expense = 0;

        transactions.forEach((t, index) => {
            const item = document.createElement('li');
            item.className = 'transaction-item';
            const symbol = t.type === 'income' ? '+' : '-';
            const color = t.type === 'income' ? 'green' : 'red';
            
            item.innerHTML = `<span>${t.desc}</span> <span style="color:${color}">${symbol}${t.amount.toFixed(2)}€</span>`;
            list.appendChild(item);

            if (t.type === 'income') {
                income += t.amount;
                balance += t.amount;
            } else {
                expense += t.amount;
                balance -= t.amount;
            }
        });

        balanceEl.innerText = `€ ${balance.toFixed(2)}`;
        incomeEl.innerText = `€ ${income.toFixed(2)}`;
        expenseEl.innerText = `€ ${expense.toFixed(2)}`;
    }

    function saveData() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function exportToExcel() {
        let csvContent = "data:text/csv;charset=utf-8,Descricao,Valor,Tipo\n";
        transactions.forEach(t => {
            csvContent += `${t.desc},${t.amount},${t.type}\n`;
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "EuroFlow_Relatorio.csv");
        document.body.appendChild(link);
        link.click();
    }

    updateUI();
</script>

</body>
</html>
