<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroFlow Pro - Gestão Financeira</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2546407384279019" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #4e54c8;
            --secondary: #8f94fb;
            --success: #2ecc71;
            --danger: #e74c3c;
            --light: #f4f7f6;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 15px;
            color: var(--dark);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .balance-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .stat-box {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: #fff;
            border: 1px solid #eee;
            margin: 0 5px;
            border-radius: 10px;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            background: #fdfdfd;
            margin-bottom: 5px;
            border-radius: 8px;
        }

        .delete-btn {
            background-color: var(--danger);
            width: 30px;
            height: 30px;
            padding: 0;
            margin: 0;
            margin-left: 10px;
            font-size: 14px;
            line-height: 30px;
            border-radius: 50%;
        }

        .ad-container {
            margin-top: 25px;
            padding: 10px;
            text-align: center;
            min-height: 100px;
            border: 1px dashed #bbb;
            background: #fafafa;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center;">
        <h1 style="margin-top:0;">EuroFlow Pro 📉</h1>
    </header>

    <div class="balance-card">
        <p style="margin:0; opacity:0.9;">Saldo Disponível</p>
        <h2 id="balance" style="font-size: 32px; margin: 10px 0;">€ 0,00</h2>
    </div>

    <div class="stats">
        <div class="stat-box">
            <small>Entradas</small>
            <div id="total-income" style="color:var(--success); font-weight:bold;">€ 0,00</div>
        </div>
        <div class="stat-box">
            <small>Saídas</small>
            <div id="total-expense" style="color:var(--danger); font-weight:bold;">€ 0,00</div>
        </div>
    </div>

    <input type="text" id="desc" placeholder="O que comprou?">
    <input type="number" id="amount" placeholder="Valor (€)">
    <select id="type">
        <option value="income">Entrada (+)</option>
        <option value="expense">Saída (-)</option>
    </select>
    <button onclick="addTransaction()">Adicionar Registo</button>
    <button style="background-color: #27ae60;" onclick="exportToExcel()">Exportar para Excel 📊</button>

    <ul id="transaction-list" style="padding:0; list-style:none; margin-top:20px;"></ul>

    <div class="ad-container">
        <small style="color:#aaa;">Publicidade</small>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-2546407384279019"
             data-ad-slot="auto"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;

        if (!desc || !amount) {
            alert("Por favor, preencha a descrição e o valor.");
            return;
        }

        const transaction = { desc, amount: parseFloat(amount), type };
        transactions.push(transaction);
        updateUI();
        saveData();
        
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function deleteTransaction(index) {
        if(confirm("Deseja apagar este registo?")) {
            transactions.splice(index, 1);
            updateUI();
            saveData();
        }
    }

    function updateUI() {
        const list = document.getElementById('transaction-list');
        let balance = 0, income = 0, expense = 0;
        list.innerHTML = '';

        transactions.forEach((t, index) => {
            const color = t.type === 'income' ? 'var(--success)' : 'var(--danger)';
            const symbol = t.type === 'income' ? '+' : '-';
            
            const li = document.createElement('li');
            li.className = 'transaction-item';
            li.innerHTML = `
                <span>${t.desc}</span>
                <div style="display:flex; align-items:center;">
                    <span style="color:${color}; font-weight:bold;">${symbol}${t.amount.toFixed(2)}€</span>
                    <button class="delete-btn" onclick="deleteTransaction(${index})">X</button>
                </div>
            `;
            list.appendChild(li);

            if (t.type === 'income') {
                income += t.amount;
                balance += t.amount;
            } else {
                expense += t.amount;
                balance -= t.amount;
            }
        });

        document.getElementById('balance').innerText = `€ ${balance.toFixed(2)}`;
        document.getElementById('total-income').innerText = `€ ${income.toFixed(2)}`;
        document.getElementById('total-expense').innerText = `€ ${expense.toFixed(2)}`;
    }

    function saveData() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function exportToExcel() {
        let csv = "Descricao,Valor,Tipo\n";
        transactions.forEach(t => csv += `${t.desc},${t.amount},${t.type}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'relatorio_financeiro.csv');
        a.click();
    }

    updateUI();
</script>
</body>
</html>
